<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FeelForm Console — Solar‑Flare v4.1</title>

  <link rel="icon" href="data:,">

  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <!-- ----------------------------------------------------
       CONSOLE NAVIGATION
  ---------------------------------------------------- -->
  <nav class="console-nav">
    <a href="#" data-target="identity" class="active">Identity</a>
    <a href="#" data-target="ritual">Ritual</a>
    <a href="#" data-target="memory">Memory</a>
  </nav>

  <div class="nav-dots">
    <div class="nav-dot active" data-target="identity"></div>
    <div class="nav-dot" data-target="ritual"></div>
    <div class="nav-dot" data-target="memory"></div>
  </div>

  <button id="sound-toggle">Sound: OFF</button>

  <!-- ----------------------------------------------------
       PANELS
  ---------------------------------------------------- -->

  <!-- IDENTITY PANEL -->
  <section id="identity" class="panel">
    <h1>Identity</h1>
    <p>Welcome to the Solar‑Flare Console.</p>
  </section>

  <!-- RITUAL PANEL -->
  <section id="ritual" class="panel" style="display:none;">
    <h1>Ritual</h1>
    <p>Ritual pathways will appear here.</p>
  </section>

  <!-- MEMORY PANEL -->
  <section id="memory" class="panel" style="display:none;">

    <h1>Memory Engine</h1>

    <div id="memory-meta"></div>

    <div id="memory-constellation" class="constellation">○</div>

    <h2>Identity Drift</h2>
    <div id="memory-identity" class="identity-timeline"></div>

    <h2>Trajectory</h2>
    <div id="memory-trajectory"></div>

    <h2>Sessions</h2>
    <div id="memory-sessions" class="session-grid"></div>

  </section>

  <!-- ----------------------------------------------------
       SCRIPT
  ---------------------------------------------------- -->
  <script src="script.js"></script>

</body>
</html>
