<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Solar‑Flare Console — Deep OS</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
</head>

<body>

<div class="ff-console">

  <!-- ===== SPINE ===== -->
  <aside class="ff-spine">
    <div>
      <div class="ff-spine-seal">FeelForm · Console</div>
      <div class="ff-spine-engraving">Solar–Flare</div>

      <nav class="ff-spine-nav" id="ffNav">
        <div class="ff-spine-nav-item active" data-chamber="identity">Identity</div>
        <div class="ff-spine-nav-item" data-chamber="reflection">Reflection</div>
        <div class="ff-spine-nav-item" data-chamber="decision">Decision</div>
        <div class="ff-spine-nav-item" data-chamber="ritual">Ritual</div>
        <div class="ff-spine-nav-item" data-chamber="memory">Memory</div>
      </nav>

      <div class="ff-spine-rail">
        <div class="ff-spine-rail-indicator" id="ffRailIndicator"></div>
      </div>
    </div>

    <div class="ff-spine-dots" id="ffDots">
      <div class="ff-spine-dot active"></div>
      <div class="ff-spine-dot"></div>
      <div class="ff-spine-dot"></div>
      <div class="ff-spine-dot"></div>
      <div class="ff-spine-dot"></div>
      <div class="ff-spine-dot"></div>
      <div class="ff-spine-dot"></div>
      <div class="ff-spine-dot"></div>
    </div>
  </aside>

  <!-- ===== CHAMBERS ===== -->
  <main class="ff-chambers">

    <!-- ===================== IDENTITY ===================== -->
    <section id="identity" class="ff-chamber identity active">
      <div class="ff-chamber-header">Identity</div>
      <div class="ff-line-soft"></div>

      <div class="ff-identity-plane">

        <div class="ff-identity-row">
          <div>
            <div class="ff-identity-label">Name</div>
            <input id="ffIdentityName" type="text" class="ff-input" placeholder="Enter name" />
          </div>
          <div>
            <div class="ff-identity-label">Role</div>
            <input id="ffIdentityRole" type="text" class="ff-input" placeholder="Enter role" />
          </div>
        </div>

        <div class="ff-identity-row">
          <div>
            <div class="ff-identity-label">Altitude</div>
            <input id="ffIdentityAltitude" type="range" min="0" max="100" />
          </div>
          <div>
            <div class="ff-identity-label">Mode</div>
            <select id="ffIdentityMode" class="ff-select">
              <option value="Clear">Clear</option>
              <option value="Drifting">Drifting</option>
              <option value="Focused">Focused</option>
              <option value="Open">Open</option>
            </select>
          </div>
        </div>

      </div>
    </section>

    <!-- ===================== REFLECTION ===================== -->
    <section id="reflection" class="ff-chamber reflection">
      <div class="ff-chamber-header">Reflection</div>
      <div class="ff-line-soft"></div>

      <div class="ff-reflection-field">

        <div>
          <div class="ff-reflection-label">Feeling</div>
          <input id="ffReflectionFeeling" type="text" class="ff-input" placeholder="What are you feeling?" />
        </div>

        <div class="ff-reflection-slider-row">
          <label>Warmth</label>
          <input id="ffReflectionWarmth" type="range" min="0" max="100" />
        </div>

        <div class="ff-reflection-slider-row">
          <label>Density</label>
          <input id="ffReflectionDensity" type="range" min="0" max="100" />
        </div>

        <div class="ff-reflection-slider-row">
          <label>Nearness</label>
          <input id="ffReflectionNearness" type="range" min="0" max="100" />
        </div>

        <div class="ff-reflection-slider-row">
          <label>Clarity</label>
          <input id="ffReflectionClarity" type="range" min="0" max="100" />
        </div>

      </div>
    </section>

    <!-- ===================== DECISION ===================== -->
    <section id="decision" class="ff-chamber decision">
      <div class="ff-chamber-header">Decision</div>
      <div class="ff-line-soft"></div>

      <div class="ff-decision-grid">

        <button class="ff-decision-vector" data-vector="A">
          <div class="ff-decision-label">Vector A</div>
          <div class="ff-decision-desc">Orientation toward clarity</div>
        </button>

        <button class="ff-decision-vector" data-vector="B">
          <div class="ff-decision-label">Vector B</div>
          <div class="ff-decision-desc">Orientation toward expansion</div>
        </button>

        <button class="ff-decision-vector" data-vector="C">
          <div class="ff-decision-label">Vector C</div>
          <div class="ff-decision-desc">Orientation toward depth</div>
        </button>

      </div>

      <div class="ff-decision-angle-display">
        Angle: <span id="ffDecisionAngle">0</span>°
      </div>
    </section>

    <!-- ===================== RITUAL ===================== -->
    <section id="ritual" class="ff-chamber ritual">
      <div class="ff-chamber-header">Ritual</div>

      <div class="ff-ritual-orb" id="ffRitualOrb"></div>
      <div class="ff-ritual-pulse" id="ffRitualPulse"></div>

      <div class="ff-ritual-field">
        <div class="ff-line-soft"></div>

        <div class="ff-ritual-stats">
          <div>Cycles: <span id="ffRitualCycles">0</span></div>
          <div>Intensity: <span id="ffRitualIntensity">0</span></div>
          <div>Last ignition: <span id="ffRitualTimestamp">—</span></div>
        </div>

        <div class="ff-line-soft"></div>
      </div>
    </section>

    <!-- ===================== MEMORY ===================== -->
    <section id="memory" class="ff-chamber memory">
      <div class="ff-chamber-header">Memory</div>

      <div class="ff-memory-plane">

        <!-- Drift particles -->
        <div class="ff-memory-drift" style="top: 18%; left: 26%;"></div>
        <div class="ff-memory-drift" style="top: 42%; left: 68%;"></div>
        <div class="ff-memory-drift" style="top: 66%; left: 40%;"></div>

        <!-- Glyph echoes -->
        <div class="ff-memory-glyph" style="top: 22%; left: 32%;">Δ</div>
        <div class="ff-memory-glyph" style="top: 48%; left: 58%;">○</div>
        <div class="ff-memory-glyph" style="top: 68%; left: 44%;">∴</div>

        <!-- Cluster lines -->
        <div class="ff-memory-cluster-line"
             style="top: 25%; left: 34%; width: 120px; transform: rotate(18deg);"></div>
        <div class="ff-memory-cluster-line"
             style="top: 52%; left: 50%; width: 90px; transform: rotate(-22deg);"></div>
        <div class="ff-memory-cluster-line"
             style="top: 60%; left: 38%; width: 110px; transform: rotate(12deg);"></div>

        <div class="ff-line-soft"></div>

        <!-- Visible Memory Log -->
        <div id="ffMemoryLog" class="ff-memory-log"></div>

        <div class="ff-line-soft"></div>
      </div>
    </section>

  </main>
</div>

<!-- JS will be added in Message 3 -->
</body>
</html>
