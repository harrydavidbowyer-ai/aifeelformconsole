<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"/><title>FeelForm OS · Ember Gold · Solar Flare</title><style>body{margin:0;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#020617;color:#e5e7eb;overflow:hidden}#ff-root{position:absolute;inset:0;display:flex;flex-direction:column;background:radial-gradient(circle at top,#020617 0,#000 55%,#020617 100%);box-shadow:inset 0 0 80px rgba(248,181,0,.25)}#ff-header{display:flex;justify-content:space-between;align-items:center;padding:10px 16px;border-bottom:1px solid rgba(55,65,81,.9);background:rgba(15,23,42,.96)}#ff-logo{font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:#fbbf24}#ff-header-center{font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:#9ca3af}#ff-header-right{display:flex;gap:6px;font-size:11px;color:#9ca3af}#ff-console{flex:1;display:grid;grid-template-columns:260px 1fr;border-bottom:1px solid rgba(55,65,81,.9)}#ff-console-tabs{border-right:1px solid rgba(55,65,81,.9);padding:10px;background:#020617;display:flex;flex-direction:column;gap:4px}.ff-console-tab{padding:7px 9px;border-radius:8px;font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:#6b7280;cursor:pointer;border:1px solid transparent;display:flex;justify-content:space-between}.ff-console-tab.ff-active{border-color:rgba(249,115,22,.7);background:rgba(248,181,0,.12);color:#fbbf24}.ff-console-panel{display:none;padding:12px}.ff-console-panel.ff-active{display:block}.ff-console-block{padding:12px;border-radius:10px;border:1px solid rgba(55,65,81,.9);background:rgba(15,23,42,.9);margin-bottom:12px}.ff-console-block h2{font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:#fbbf24;margin-bottom:4px}.ff-console-block p{font-size:12px;color:#d1d5db}.ff-memory-section{padding:12px;border-radius:10px;border:1px solid rgba(55,65,81,.9);background:rgba(15,23,42,.9);margin-bottom:12px}.ff-memory-title{font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:#fbbf24;margin-bottom:6px}.ff-memory-strip{display:flex;gap:8px;flex-wrap:wrap}.ff-memory-pill{min-width:150px;padding:7px 9px;border-radius:999px;border:1px solid rgba(248,181,0,.7);background:rgba(15,23,42,.8)}.ff-label{font-size:9px;letter-spacing:.16em;text-transform:uppercase;color:#fed7aa;opacity:.8}.ff-value{font-size:12px;color:#fef3c7}.ff-memory-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}.ff-memory-panel{padding:8px;border-radius:9px;border:1px solid rgba(248,181,0,.5);background:rgba(15,23,42,.8)}.ff-memory-panel header{font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:#fed7aa;margin-bottom:4px}.ff-memory-scroll{max-height:120px;overflow:auto;font-size:11px;color:#e5e7eb}.ff-memory-timeline{padding:8px;border-radius:9px;border:1px solid rgba(55,65,81,.9);background:rgba(15,23,42,.8);margin-top:8px}.ff-memory-timeline header{font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:#fbbf24;margin-bottom:4px}.ff-memory-sessions{display:flex;flex-direction:column;gap:6px;max-height:140px;overflow:auto}.ff-memory-session-card{padding:6px 8px;border-radius:7px;border:1px solid rgba(248,181,0,.7);background:rgba(15,23,42,.8);display:flex;justify-content:space-between;font-size:11px;color:#fef3c7}.ff-memory-inputs{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:8px}.ff-memory-inputs input,.ff-memory-inputs textarea{width:100%;background:#020617;border:1px solid #1f2937;border-radius:4px;color:#f9fafb;font-size:12px;padding:6px 8px}.ff-memory-controls{display:flex;justify-content:flex-end;gap:8px;margin-top:8px}.ff-memory-controls button{padding:6px 12px;font-size:10px;letter-spacing:.16em;text-transform:uppercase;border-radius:4px;border:1px solid #f97316;background:#020617;color:#fed7aa;cursor:pointer}</style></head><body><div id="ff-root"><div id="ff-header"><div id="ff-logo">FEELFORM OS</div><div id="ff-header-center">SOLAR FLARE</div><div id="ff-header-right">EMBER GOLD</div></div><div id="ff-console"><div id="ff-console-tabs"><div class="ff-console-tab ff-active" data-panel="overview">OVERVIEW</div><div class="ff-console-tab" data-panel="memory">MEMORY</div><div class="ff-console-tab" data-panel="engine">ENGINE</div></div><div id="ff-console-panels"><div class="ff-console-panel ff-active" id="panel-overview"><div class="ff-console-block"><h2>System</h2><p>Solar‑Flare Ember‑Gold shard operational.</p></div></div><div class="ff-console-panel" id="panel-memory"><div class="ff-memory-section"><div class="ff-memory-title">Memory</div><div class="ff-memory-strip"><div class="ff-memory-pill"><div class="ff-label">State</div><div class="ff-value">Active</div></div><div class="ff-memory-pill"><div class="ff-label">Cycles</div><div class="ff-value">0</div></div></div><div class="ff-memory-grid"><div class="ff-memory-panel"><header>Notes</header><div class="ff-memory-scroll" id="ff-notes"></div></div><div class="ff-memory-panel"><header>Events</header><div class="ff-memory-scroll" id="ff-events"></div></div><div class="ff-memory-panel"><header>Signals</header><div class="ff-memory-scroll" id="ff-signals"></div></div></div><div class="ff-memory-timeline"><header>Sessions</header><div class="ff-memory-sessions" id="ff-sessions"></div></div><div class="ff-memory-inputs"><div><label>Note</label><input id="ff-note-input"/></div><div><label>Event</label><input id="ff-event-input"/></div><div><label>Signal</label><input id="ff-signal-input"/></div></div><div class="ff-memory-controls"><button id="ff-add">Add</button></div></div></div><div class="ff-console-panel" id="panel-engine"><div class="ff-console-block"><h2>Engine</h2><p>Core shard running.</p></div></div></div></div></div><script>document.querySelectorAll(".ff-console-tab").forEach(t=>t.onclick=()=>{document.querySelectorAll(".ff-console-tab").forEach(x=>x.classList.remove("ff-active"));t.classList.add("ff-active");document.querySelectorAll(".ff-console-panel").forEach(p=>p.classList.remove("ff-active"));document.querySelector("#panel-"+t.dataset.panel).classList.add("ff-active")});document.getElementById("ff-add").onclick=()=>{let n=document.getElementById("ff-note-input").value.trim(),e=document.getElementById("ff-event-input").value.trim(),s=document.getElementById("ff-signal-input").value.trim();if(n)document.getElementById("ff-notes").innerHTML+="<div>"+n+"</div>";if(e)document.getElementById("ff-events").innerHTML+="<div>"+e+"</div>";if(s)document.getElementById("ff-signals").innerHTML+="<div>"+s+"</div>";if(n||e||s){document.getElementById("ff-sessions").innerHTML+="<div class='ff-memory-session-card'><div>"+(new Date).toLocaleTimeString()+"</div><div>"+(n||e||s)+"</div></div>";document.getElementById("ff-note-input").value="";document.getElementById("ff-event-input").value="";document.getElementById("ff-signal-input").value=""}};</script></body></html>
