<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>FeelForm Console</title>

<style>
body {
  background: #0a0a0a;
  color: #eaeaea;
  font-family: "Inter", sans-serif;
  margin: 0;
  padding: 0;
}

.ff-console {
  width: 100%;
  max-width: 900px;
  margin: 40px auto;
  padding: 20px;
  border: 1px solid #222;
  background: #111;
  border-radius: 12px;
}

.ff-console-tabs {
  display: flex;
  gap: 12px;
  margin-bottom: 20px;
}

.ff-console-tab {
  padding: 10px 18px;
  border: 1px solid #333;
  cursor: pointer;
  border-radius: 6px;
  opacity: 0.6;
}

.ff-console-tab.ff-active {
  opacity: 1;
  border-color: #888;
}

.ff-console-panel {
  display: none;
}

.ff-console-panel.ff-active {
  display: block;
}

.ff-chamber {
  display: none;
}

.ff-chamber.ff-active {
  display: block;
}

.ff-next {
  margin-top: 20px;
  padding: 10px 18px;
  border: 1px solid #444;
  cursor: pointer;
  display: inline-block;
}

.ff-memory-item {
  padding: 6px 0;
  border-bottom: 1px solid #222;
}

.ff-session-pill {
  padding: 10px;
  margin-bottom: 10px;
  border: 1px solid #333;
  border-radius: 6px;
}
</style>
</head>

  <script>
const FF_API_BASE = "https://aifeelformconsole.onrender.com";

/* -------------------------------
   TABS
--------------------------------*/
document.querySelectorAll(".ff-console-tab").forEach(tab => {
  tab.addEventListener("click", () => {
    const target = tab.getAttribute("data-tab");

    document.querySelectorAll(".ff-console-tab").forEach(t =>
      t.classList.remove("ff-active")
    );
    tab.classList.add("ff-active");

    document.querySelectorAll(".ff-console-panel").forEach(panel =>
      panel.classList.remove("ff-active")
    );

    const panel = document.getElementById(`ff-panel-${target}`);
    if (panel) panel.classList.add("ff-active");
  });
});

/* -------------------------------
   CHAMBER NAVIGATION
--------------------------------*/
function ffShowChamber(name) {
  document.querySelectorAll(".ff-chamber").forEach(ch =>
    ch.classList.remove("ff-active")
  );
  const target = document.getElementById(`ff-chamber-${name}`);
  if (target) target.classList.add("ff-active");
}

document.querySelectorAll(".ff-next").forEach(btn => {
  btn.addEventListener("click", () => {
    const next = btn.getAttribute("data-next");
    if (next) ffShowChamber(next);
  });
});

/* -------------------------------
   MEMORY ENGINE — SAVE
--------------------------------*/
async function ffSaveCycle() {
  const status = document.querySelector("[data-ff-status='memory']");
  if (status) {
    status.textContent = "Saving…";
    status.style.color = "";
  }

  const payload = {
    pulse: document.querySelector("[data-ff-input='pulse']").value.trim(),
    somatic: document.querySelector("[data-ff-input='somatic']").value.trim(),
    amplitude: parseFloat(
      document.querySelector("[data-ff-input='amplitude']").value || 0
    ),
    reflection: document
      .querySelector("[data-ff-input='reflection']")
      .value.trim(),
    decision: document.querySelector("[data-ff-input='decision']").value.trim(),
    identity: document.querySelector("[data-ff-input='identity']").value.trim(),
    timestamp: Date.now()
  };

  try {
    const res = await fetch(`${FF_API_BASE}/api/session`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(payload)
    });

    if (!res.ok) throw new Error("Failed to save");

    if (status) {
      status.textContent = "Saved";
      status.style.color = "limegreen";
    }

    ffLoadMemory();
  } catch (err) {
    console.error("Memory save error:", err);
    if (status) {
      status.textContent = "Error saving";
      status.style.color = "red";
    }
  } finally {
    setTimeout(() => {
      if (status) {
        status.textContent = "";
        status.style.color = "";
      }
    }, 2500);
  }
}

/* -------------------------------
   MEMORY ENGINE — LOAD
--------------------------------*/
async function ffLoadMemory() {
  try {
    const res = await fetch(`${FF_API_BASE}/api/memory`);
    if (!res.ok) throw new Error("Failed to load");

    const memory = await res.json();
    const cycles = memory.sessions || [];

    // Totals
    document.getElementById("ff-memory-total").textContent = cycles.length;

    // Last cycle
    if (cycles.length > 0) {
      const last = cycles[cycles.length - 1];
      document.getElementById("ff-memory-last-identity").textContent =
        last.identity || "—";
      document.getElementById("ff-memory-last-amplitude").textContent =
        last.amplitude ?? "—";
    }

    // Identity Drift
    document.getElementById("ff-memory-identity").innerHTML = cycles
      .map(c => `<div class="ff-memory-item">${c.identity || "—"}</div>`)
      .join("");

    // Trajectory
    document.getElementById("ff-memory-trajectory").innerHTML = cycles
      .map(c => `<div class="ff-memory-item">${c.pulse || "—"}</div>`)
      .join("");

    // Meta
    document.getElementById("ff-memory-meta").innerHTML = cycles
      .map(c => `<div class="ff-memory-item">${c.reflection || "—"}</div>`)
      .join("");

    // Sessions
    document.getElementById("ff-memory-sessions").innerHTML = cycles
      .map(c => {
        const date = c.timestamp
          ? new Date(c.timestamp).toLocaleString()
          : "—";
        return `
          <div class="ff-session-pill">
            <strong>${date}</strong>
            <div>${c.identity || "—"}</div>
          </div>`;
      })
      .join("");
  } catch (err) {
    console.error("Memory load error:", err);
  }
}

/* -------------------------------
   INIT
--------------------------------*/
document
  .querySelector("[data-ff-action='complete-cycle']")
  .addEventListener("click", ffSaveCycle);

ffLoadMemory();
</script>
<body>

<div class="ff-console">

  <!-- TABS -->
  <div class="ff-console-tabs">
    <div class="ff-console-tab ff-active" data-tab="ritual">Ritual</div>
    <div class="ff-console-tab" data-tab="memory">Memory</div>
  </div>

  <!-- RITUAL PANEL -->
  <div id="ff-panel-ritual" class="ff-console-panel ff-active">

    <div id="ff-chamber-pulse" class="ff-chamber ff-active">
      <h2>Pulse</h2>
      <input data-ff-input="pulse" placeholder="Pulse…" />
      <div class="ff-next" data-next="somatic">Next</div>
    </div>

    <div id="ff-chamber-somatic" class="ff-chamber">
      <h2>Somatic</h2>
      <input data-ff-input="somatic" placeholder="Somatic…" />
      <div class="ff-next" data-next="amplitude">Next</div>
    </div>

    <div id="ff-chamber-amplitude" class="ff-chamber">
      <h2>Amplitude</h2>
      <input data-ff-input="amplitude" type="number" placeholder="Amplitude…" />
      <div class="ff-next" data-next="reflection">Next</div>
    </div>

    <div id="ff-chamber-reflection" class="ff-chamber">
      <h2>Reflection</h2>
      <input data-ff-input="reflection" placeholder="Reflection…" />
      <div class="ff-next" data-next="decision">Next</div>
    </div>

    <div id="ff-chamber-decision" class="ff-chamber">
      <h2>Decision</h2>
      <input data-ff-input="decision" placeholder="Decision…" />
      <div class="ff-next" data-next="identity">Next</div>
    </div>

    <div id="ff-chamber-identity" class="ff-chamber">
      <h2>Identity</h2>
      <input data-ff-input="identity" placeholder="Identity…" />
      <div class="ff-next" data-ff-action="complete-cycle">Complete Cycle</div>
      <div data-ff-status="memory" style="margin-top:10px;color:#888;"></div>
    </div>

  </div>

  <!-- MEMORY PANEL -->
  <div id="ff-panel-memory" class="ff-console-panel">
    <h2>Memory Engine</h2>

    <p>Total Cycles: <span id="ff-memory-total">0</span></p>
    <p>Last Identity: <span id="ff-memory-last-identity">—</span></p>
    <p>Last Amplitude: <span id="ff-memory-last-amplitude">—</span></p>

    <h3>Identity Drift</h3>
    <div id="ff-memory-identity"></div>

    <h3>Trajectory</h3>
    <div id="ff-memory-trajectory"></div>

    <h3>Meta</h3>
    <div id="ff-memory-meta"></div>

    <h3>Sessions</h3>
    <div id="ff-memory-sessions"></div>
  </div>

</div>
